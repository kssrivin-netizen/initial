<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Cricket</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b2f;
    --green-light: #2d9e47;
    --green-dark: #0e3d1a;
    --pitch: #c8a96e;
    --pitch-dark: #a8894e;
    --white: #f5f0e8;
    --gold: #e8c84a;
    --red: #cc2200;
    --sky: #87ceeb;
    --crowd: #2a1a0a;
    --text: #1a1a0a;
    --panel: rgba(10,30,15,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--green-dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STADIUM BACKGROUND */
  .stadium-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 100%, var(--green) 0%, var(--green-dark) 60%, #050f08 100%);
    overflow: hidden;
  }
  .stadium-bg::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 40px,
      rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px
    ), repeating-linear-gradient(
      90deg, transparent, transparent 40px,
      rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px
    );
  }
  /* Crowd silhouette */
  .crowd {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 180px;
    background: linear-gradient(to top, var(--crowd) 0%, transparent 100%);
    clip-path: polygon(
      0% 100%, 0% 60%, 2% 55%, 4% 62%, 6% 50%, 8% 58%, 10% 48%,
      12% 56%, 14% 44%, 16% 52%, 18% 42%, 20% 50%, 22% 40%,
      24% 48%, 26% 38%, 28% 46%, 30% 36%, 32% 44%, 34% 34%,
      36% 42%, 38% 32%, 40% 40%, 42% 30%, 44% 38%, 46% 28%,
      48% 36%, 50% 26%, 52% 34%, 54% 28%, 56% 36%, 58% 26%,
      60% 34%, 62% 28%, 64% 36%, 66% 30%, 68% 38%, 70% 28%,
      72% 36%, 74% 30%, 76% 38%, 78% 32%, 80% 40%, 82% 34%,
      84% 42%, 86% 36%, 88% 44%, 90% 38%, 92% 46%, 94% 52%,
      96% 44%, 98% 56%, 100% 50%, 100% 100%
    );
  }
  /* Pitch oval */
  .pitch-oval {
    position: absolute;
    bottom: 10%; left: 50%; transform: translateX(-50%);
    width: 340px; height: 100px;
    background: radial-gradient(ellipse, var(--pitch) 0%, var(--pitch-dark) 70%, var(--green) 100%);
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(200,169,110,0.3);
  }
  /* Stumps */
  .stumps {
    position: absolute;
    bottom: calc(10% + 30px); left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
  }
  .stump {
    width: 5px; height: 45px;
    background: linear-gradient(to bottom, #e8c84a, #c8a020);
    border-radius: 2px 2px 0 0;
    box-shadow: 0 0 8px rgba(232,200,74,0.6);
  }
  .bail {
    position: absolute; top: -4px;
    width: 22px; height: 4px;
    background: var(--gold);
    border-radius: 2px;
    left: -4px;
    box-shadow: 0 0 6px rgba(232,200,74,0.8);
  }

  /* CRICKET BALL ANIMATION */
  .ball-anim {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff6644, var(--red) 60%, #8b1100);
    box-shadow: 0 0 12px rgba(204,34,0,0.7), inset 0 0 6px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }
  .ball-anim::after {
    content: '';
    position: absolute; top: 50%; left: 10%;
    width: 80%; height: 2px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    transform: translateY(-50%);
  }
  .ball-anim.throw {
    animation: ballThrow 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes ballThrow {
    0%   { opacity:1; bottom: 15%; left: 52%; transform: scale(0.6); }
    40%  { opacity:1; bottom: 45%; left: 50%; transform: scale(1); }
    80%  { opacity:1; bottom: 70%; left: 48%; transform: scale(0.8); }
    100% { opacity:0; bottom: 80%; left: 46%; transform: scale(0.4); }
  }
  .ball-anim.hit {
    animation: ballHit 1s cubic-bezier(0.15, 0.85, 0.45, 1) forwards;
  }
  @keyframes ballHit {
    0%   { opacity:1; bottom: 15%; left: 52%; transform: scale(1); }
    30%  { opacity:1; bottom: 55%; left: 75%; transform: scale(1.1); }
    70%  { opacity:0.7; bottom: 30%; left: 90%; transform: scale(0.7); }
    100% { opacity:0; bottom: 10%; left: 100%; transform: scale(0.3); }
  }
  .ball-anim.dot {
    animation: ballDot 0.7s ease-in-out forwards;
  }
  @keyframes ballDot {
    0%   { opacity:1; bottom:15%; left:52%; transform:scale(1); }
    50%  { opacity:1; bottom:35%; left:55%; transform:scale(1.1); }
    100% { opacity:0; bottom:18%; left:50%; transform:scale(0.5); }
  }

  /* BAT ANIMATION */
  .bat-anim {
    position: absolute;
    bottom: 14%; right: 30%;
    width: 14px; height: 70px;
    opacity: 0;
    transform-origin: bottom center;
    z-index: 6;
    pointer-events: none;
  }
  .bat-anim .bat-blade {
    width: 14px; height: 52px;
    background: linear-gradient(to right, #c8a96e, #e8c88e, #c8a96e);
    border-radius: 3px 3px 5px 5px;
    box-shadow: 2px 0 8px rgba(0,0,0,0.4);
  }
  .bat-anim .bat-handle {
    width: 6px; height: 18px;
    background: linear-gradient(to right, #6b4423, #8b6443);
    margin: 0 auto;
    border-radius: 3px;
  }
  .bat-anim.swing {
    opacity: 1;
    animation: batSwing 0.5s ease-in-out forwards;
  }
  @keyframes batSwing {
    0%   { opacity:1; transform: rotate(-60deg); }
    50%  { opacity:1; transform: rotate(30deg); }
    100% { opacity:0; transform: rotate(10deg); }
  }

  /* SCORE FLASH */
  .score-flash {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Teko', sans-serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(232,200,74,0.9), 0 4px 0 rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 100;
    opacity: 0;
  }
  .score-flash.pop {
    animation: scorePop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes scorePop {
    0%   { transform: translate(-50%,-50%) scale(0); opacity:0; }
    20%  { transform: translate(-50%,-50%) scale(1.3); opacity:1; }
    60%  { transform: translate(-50%,-50%) scale(1); opacity:1; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity:0; }
  }

  /* WICKET FLASH */
  .wicket-flash {
    position: fixed; inset: 0; z-index: 99;
    background: rgba(204,34,0,0.25);
    pointer-events: none;
    opacity: 0;
  }
  .wicket-flash.burst {
    animation: wicketBurst 0.6s ease-out forwards;
  }
  @keyframes wicketBurst {
    0%  { opacity:0.6; }
    100%{ opacity:0; }
  }

  /* MAIN CONTENT */
  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 40px;
  }

  /* HEADER */
  .header {
    text-align: center; margin-bottom: 24px;
  }
  .header h1 {
    font-family: 'Teko', sans-serif;
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold);
    text-shadow: 0 2px 20px rgba(232,200,74,0.5), 0 4px 0 rgba(0,0,0,0.6);
    line-height: 1;
  }
  .header p {
    font-size: 0.85rem;
    color: rgba(245,240,232,0.55);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* SCOREBOARD */
  .scoreboard {
    background: var(--panel);
    border: 1px solid rgba(232,200,74,0.3);
    border-radius: 12px;
    padding: 16px 24px;
    width: 100%; max-width: 520px;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .scoreboard-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .scoreboard-top .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.45);
  }
  .innings-badge {
    font-family: 'Teko', sans-serif;
    font-size: 0.9rem;
    background: rgba(232,200,74,0.15);
    border: 1px solid rgba(232,200,74,0.3);
    color: var(--gold);
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.1em;
  }
  .score-row {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 12px;
  }
  .score-team { text-align: center; }
  .score-team .team-name {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.5);
    margin-bottom: 2px;
  }
  .score-team .runs {
    font-family: 'Teko', sans-serif;
    font-size: 3.2rem;
    font-weight: 600;
    line-height: 1;
    color: var(--white);
    transition: color 0.3s;
  }
  .score-team .runs.updated { color: var(--gold); }
  .score-sep {
    font-family: 'Teko', sans-serif;
    font-size: 1.8rem;
    color: rgba(245,240,232,0.2);
  }
  .target-bar {
    margin-top: 10px;
    text-align: center;
    font-size: 0.78rem;
    color: rgba(245,240,232,0.5);
  }
  .target-bar span {
    color: var(--gold);
    font-weight: 600;
  }
  /* Last balls */
  .balls-row {
    display: flex; gap: 6px; justify-content: center; margin-top: 12px;
    flex-wrap: wrap;
  }
  .ball-dot {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Teko', sans-serif;
    font-size: 1rem; font-weight: 600;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(245,240,232,0.4);
    transition: all 0.3s;
  }
  .ball-dot.run1,.ball-dot.run2 { background:rgba(46,160,67,0.3); border-color:rgba(46,160,67,0.6); color:#6edc8e; }
  .ball-dot.run3,.ball-dot.run4 { background:rgba(232,200,74,0.2); border-color:rgba(232,200,74,0.5); color:var(--gold); }
  .ball-dot.run5,.ball-dot.run6 { background:rgba(232,200,74,0.35); border-color:var(--gold); color:var(--gold); }
  .ball-dot.wicket { background:rgba(204,34,0,0.3); border-color:rgba(204,34,0,0.7); color:#ff6644; }
  .ball-dot.zero { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); color:rgba(245,240,232,0.35); }

  /* GAME PANEL */
  .game-panel {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    width: 100%; max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .message-box {
    font-size: 1rem;
    color: var(--white);
    line-height: 1.5;
    margin-bottom: 16px;
    min-height: 48px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    border-left: 3px solid var(--gold);
  }

  /* INPUT */
  .input-group {
    display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
  }
  input[type="text"] {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: rgba(245,240,232,0.3); }

  /* RUNS GRID */
  .runs-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .run-btn {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Teko', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    position: relative; overflow: hidden;
  }
  .run-btn:hover {
    background: rgba(232,200,74,0.15);
    border-color: rgba(232,200,74,0.5);
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(232,200,74,0.2);
  }
  .run-btn:active { transform: translateY(0); }
  .run-btn.selected {
    background: rgba(232,200,74,0.25);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 16px rgba(232,200,74,0.3);
  }
  .run-btn:disabled {
    opacity: 0.3; cursor: not-allowed; transform: none;
  }

  /* BUTTONS */
  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    border: none;
    font-family: 'Teko', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e8c84a, #c8980a);
    color: #1a1a0a;
    box-shadow: 0 4px 20px rgba(232,200,74,0.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(232,200,74,0.5);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    color: var(--white);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* TOSS */
  .toss-options { display: flex; gap: 10px; margin-bottom: 14px; }
  .toss-btn, .choice-btn {
    flex: 1; padding: 14px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Teko', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .toss-btn:hover, .choice-btn:hover {
    background: rgba(232,200,74,0.12);
    border-color: rgba(232,200,74,0.4);
    color: var(--gold);
  }
  .toss-btn.active, .choice-btn.active {
    background: rgba(232,200,74,0.2);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* COIN */
  .coin-wrap {
    text-align: center; padding: 10px 0 16px;
  }
  .coin {
    display: inline-block;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #a07010);
    border: 3px solid rgba(255,255,255,0.2);
    font-family: 'Teko', sans-serif;
    font-size: 1.3rem;
    color: #3a2000;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 8px;
    box-shadow: 0 4px 20px rgba(232,200,74,0.4);
  }
  .coin.flip { animation: coinFlip 0.8s ease-in-out forwards; }
  @keyframes coinFlip {
    0%   { transform: rotateY(0); }
    50%  { transform: rotateY(900deg) scale(1.2); }
    100% { transform: rotateY(1800deg); }
  }

  /* RESULT */
  .result-panel {
    text-align: center; padding: 10px 0;
  }
  .result-panel .winner {
    font-family: 'Teko', sans-serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(232,200,74,0.7);
    margin-bottom: 6px;
  }
  .result-panel .final-scores {
    font-size: 0.9rem;
    color: rgba(245,240,232,0.6);
    margin-bottom: 16px;
  }

  /* Firework */
  .firework { position:fixed; pointer-events:none; z-index:200; }
  .spark {
    position:absolute; width:6px; height:6px; border-radius:50%;
    animation: sparkFly 1s ease-out forwards;
  }
  @keyframes sparkFly {
    0%   { transform:translate(0,0) scale(1); opacity:1; }
    100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
  }

  /* STATUS TAG */
  .status-tag {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .status-bat { background:rgba(46,160,67,0.25); color:#6edc8e; border:1px solid rgba(46,160,67,0.4); }
  .status-bowl { background:rgba(204,34,0,0.2); color:#ff8866; border:1px solid rgba(204,34,0,0.4); }

  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* Responsive */
  @media(max-width:400px){
    .runs-grid { grid-template-columns: repeat(4,1fr); }
    .run-btn { font-size:1.2rem; }
  }
</style>
</head>
<body>

<div class="stadium-bg">
  <div class="crowd"></div>
  <div class="pitch-oval"></div>
  <div class="stumps">
    <div class="stump"></div>
    <div class="stump"></div>
    <div class="stump" style="position:relative"><div class="bail"></div></div>
  </div>
</div>

<!-- Animations -->
<div class="ball-anim" id="ballAnim"></div>
<div class="bat-anim" id="batAnim">
  <div class="bat-blade"></div>
  <div class="bat-handle"></div>
</div>
<div class="score-flash" id="scoreFlash"></div>
<div class="wicket-flash" id="wicketFlash"></div>

<div id="app">
  <div class="header">
    <h1>🏏 HAND CRICKET</h1>
    <p>Finger tips to boundaries</p>
    <p style="font-size:0.75rem;color:rgba(245,240,232,0.35);margin-top:4px;letter-spacing:0.15em;">CREATED BY SRIVIN</p>
  </div>

  <!-- SCOREBOARD (always visible) -->
  <div class="scoreboard">
    <div class="scoreboard-top">
      <span class="label">Live Score</span>
      <span class="innings-badge" id="inningsBadge">1st Innings</span>
    </div>
    <div class="score-row">
      <div class="score-team">
        <div class="team-name" id="team1Name">YOU</div>
        <div class="runs" id="score1">—</div>
      </div>
      <div class="score-sep">vs</div>
      <div class="score-team">
        <div class="team-name" id="team2Name">CPU</div>
        <div class="runs" id="score2">—</div>
      </div>
    </div>
    <div class="target-bar" id="targetBar" style="display:none">
      Target: <span id="targetDisplay">0</span> &nbsp;|&nbsp; Need: <span id="needDisplay">0</span>
    </div>
    <div class="balls-row" id="ballsRow"></div>
  </div>

  <!-- GAME PANEL -->
  <div class="game-panel fade-in" id="gamePanel">

    <!-- SCREEN: Name Entry -->
    <div id="screenName">
      <div class="message-box">Welcome to Hand Cricket! Enter your name to begin.</div>
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Your name..." maxlength="20">
        <button class="btn btn-primary" onclick="submitName()">Play</button>
      </div>
    </div>

    <!-- SCREEN: Toss -->
    <div id="screenToss" class="hidden">
      <div class="message-box" id="tossMsg">TOSS TIME! Call it:</div>
      <div class="toss-options">
        <button class="toss-btn" id="btnHeads" onclick="pickToss('heads')">🪙 Heads</button>
        <button class="toss-btn" id="btnTails" onclick="pickToss('tails')">🪙 Tails</button>
      </div>
      <div class="coin-wrap hidden" id="coinWrap">
        <div class="coin" id="coinEl">?</div>
        <div id="tossResult" style="font-size:0.9rem;color:rgba(245,240,232,0.6)"></div>
      </div>
      <button class="btn btn-primary hidden" id="btnFlip" onclick="flipCoin()">Flip!</button>
    </div>

    <!-- SCREEN: Bat/Bowl Choice -->
    <div id="screenChoice" class="hidden">
      <div class="message-box" id="choiceMsg">You won the toss! Choose to bat or bowl:</div>
      <div class="toss-options">
        <button class="choice-btn" onclick="makeChoice('bat')">🏏 Bat First</button>
        <button class="choice-btn" onclick="makeChoice('bowl')">⚾ Bowl First</button>
      </div>
    </div>

    <!-- SCREEN: Play -->
    <div id="screenPlay" class="hidden">
      <div class="message-box" id="playMsg">Select your number (0–6):</div>
      <div id="statusTag"></div>
      <div class="runs-grid" id="runsGrid"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnPlay" onclick="playBall()" disabled>Play Ball</button>
      </div>
    </div>

    <!-- SCREEN: Result -->
    <div id="screenResult" class="hidden">
      <div class="result-panel">
        <div class="winner" id="resultWinner"></div>
        <div class="final-scores" id="resultScores"></div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ---- STATE ----
let state = {
  name: '',
  pick: '',      // heads/tails
  result: 0,     // 0=heads, 1=tails
  userWonToss: false,
  choice: '',    // bat/bowl
  userBatsFirst: false,
  frstscore: 0,
  scndscore: 0,
  target: 0,
  chosen: -1,
  phase: 'name', // name|toss|choice|innings1|innings2|result
  battingNow: '', // 'user'|'cpu'
  balls: [],     // last balls for display
};

// ---- SCREENS ----
function showScreen(id){
  ['screenName','screenToss','screenChoice','screenPlay','screenResult'].forEach(s=>{
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ---- NAME ----
function submitName(){
  const v = document.getElementById('nameInput').value.trim();
  if(!v) return;
  state.name = v;
  document.getElementById('team1Name').textContent = v.toUpperCase().slice(0,8);
  showScreen('screenToss');
  state.phase = 'toss';
}
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') submitName(); });

// ---- TOSS ----
function pickToss(pick){
  state.pick = pick;
  document.querySelectorAll('.toss-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(pick==='heads'?'btnHeads':'btnTails').classList.add('active');
  document.getElementById('btnFlip').classList.remove('hidden');
  document.getElementById('coinWrap').classList.remove('hidden');
}

function flipCoin(){
  state.result = Math.floor(Math.random()*2);
  const coin = document.getElementById('coinEl');
  coin.classList.remove('flip');
  void coin.offsetWidth;
  coin.classList.add('flip');
  document.getElementById('btnFlip').disabled = true;
  setTimeout(()=>{
    const face = state.result===0 ? 'H' : 'T';
    coin.textContent = face;
    const faceWord = state.result===0 ? 'Heads' : 'Tails';
    document.getElementById('tossResult').textContent = `It's ${faceWord}!`;
    state.userWonToss = (state.pick==='heads' && state.result===0) || (state.pick==='tails' && state.result===1);
    setTimeout(()=>{
      if(state.userWonToss){
        showScreen('screenChoice');
        document.getElementById('choiceMsg').textContent = `${faceWord}! You won the toss — bat or bowl?`;
      } else {
        // Computer chooses
        const compChoice = Math.random()<0.5 ? 'bat' : 'bowl';
        state.choice = compChoice;
        state.userBatsFirst = (compChoice === 'bowl');
        document.getElementById('tossMsg').textContent = `You lost! Computer chose to ${compChoice} first.`;
        setTimeout(()=> startInnings1(), 1400);
      }
    }, 600);
  }, 900);
}

// ---- CHOICE ----
function makeChoice(c){
  state.choice = c;
  state.userBatsFirst = (c === 'bat');
  startInnings1();
}

// ---- INNINGS SETUP ----
function startInnings1(){
  state.balls = [];
  updateBallsDisplay();
  if(state.userBatsFirst){
    state.battingNow = 'user';
    setPlayScreen(`${state.name} bats first! Pick your runs (0–6):`, 'bat');
  } else {
    state.battingNow = 'cpu';
    setPlayScreen(`CPU bats first! Pick a number to bowl (0–6):`, 'bowl');
  }
  updateScoreboard();
  showScreen('screenPlay');
  state.phase = 'innings1';
}

function startInnings2(){
  state.balls = [];
  updateBallsDisplay();
  state.target = state.frstscore;
  document.getElementById('targetBar').style.display = 'block';
  document.getElementById('targetDisplay').textContent = state.target;
  document.getElementById('needDisplay').textContent = state.target + 1;
  document.getElementById('inningsBadge').textContent = '2nd Innings';

  if(state.userBatsFirst){
    // user batted first, now cpu chases
    state.battingNow = 'cpu';
    setPlayScreen(`CPU chases ${state.target+1}. Bowl them out! Pick (0–6):`, 'bowl');
  } else {
    // cpu batted first, now user chases
    state.battingNow = 'user';
    setPlayScreen(`You need ${state.target+1} to win! Pick your runs (0–6):`, 'bat');
  }
  updateScoreboard();
  showScreen('screenPlay');
  state.phase = 'innings2';
}

function setPlayScreen(msg, role){
  document.getElementById('playMsg').textContent = msg;
  const tag = document.getElementById('statusTag');
  if(role==='bat'){
    tag.innerHTML = `<span class="status-tag status-bat">🏏 Batting</span>`;
  } else {
    tag.innerHTML = `<span class="status-tag status-bowl">⚾ Bowling</span>`;
  }
  buildRunsGrid();
  state.chosen = -1;
  document.getElementById('btnPlay').disabled = true;
}

// ---- RUNS GRID ----
function buildRunsGrid(){
  const g = document.getElementById('runsGrid');
  g.innerHTML = '';
  for(let i=0;i<=6;i++){
    const b = document.createElement('button');
    b.className = 'run-btn';
    b.textContent = i;
    b.dataset.val = i;
    b.onclick = ()=>selectRun(i, b);
    g.appendChild(b);
  }
}

function selectRun(val, el){
  document.querySelectorAll('.run-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  state.chosen = val;
  document.getElementById('btnPlay').disabled = false;
}

// ---- PLAY BALL ----
function playBall(){
  if(state.chosen < 0) return;
  const ball = Math.floor(Math.random()*7);
  const chosen = state.chosen;

  // reset selection
  document.querySelectorAll('.run-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('btnPlay').disabled = true;
  state.chosen = -1;

  if(state.phase === 'innings1'){
    handleInnings1Ball(chosen, ball);
  } else {
    handleInnings2Ball(chosen, ball);
  }
}

function handleInnings1Ball(chosen, ball){
  if(state.battingNow === 'user'){
    // user batting
    if(ball === chosen){
      // OUT
      triggerWicket();
      addBallDisplay('W');
      state.balls.push({t:'wicket'});
      updateBallsDisplay();
      document.getElementById('playMsg').textContent = `OUT! You scored ${state.chosen} and so did the CPU. Your total: ${state.frstscore}`;
      setTimeout(()=>{
        state.target = state.frstscore;
        showFlash(`OUT!`);
        setTimeout(()=> startInnings2(), 1200);
      }, 600);
    } else {
      state.frstscore += chosen;
      triggerBatAnim(chosen);
      addBallDisplay(chosen);
      updateScoreboard('user');
      showFlash(chosen === 0 ? 'DOT' : `${chosen}!`);
      document.getElementById('playMsg').textContent = chosen === 0
        ? `Dot ball! Score: ${state.frstscore}`
        : `You scored ${chosen}! Total: ${state.frstscore}`;
    }
  } else {
    // cpu batting, user bowling
    if(ball === chosen){
      triggerWicket();
      addBallDisplay('W');
      updateBallsDisplay();
      document.getElementById('playMsg').textContent = `CPU is OUT! CPU total: ${state.frstscore}`;
      setTimeout(()=>{
        state.target = state.frstscore;
        showFlash(`WICKET!`);
        setTimeout(()=> startInnings2(), 1200);
      }, 600);
    } else {
      state.frstscore += ball;
      triggerThrowAnim();
      addBallDisplay(ball);
      updateScoreboard('cpu1');
      showFlash(ball === 0 ? 'DOT' : `${ball}!`);
      document.getElementById('playMsg').textContent = ball === 0
        ? `Dot ball! CPU score: ${state.frstscore}`
        : `CPU scored ${ball}! Total: ${state.frstscore}`;
    }
  }
}

function handleInnings2Ball(chosen, ball){
  if(state.battingNow === 'cpu'){
    // cpu chasing, user bowling
    if(ball === chosen){
      triggerWicket();
      addBallDisplay('W');
      updateBallsDisplay();
      document.getElementById('playMsg').textContent = `CPU is OUT! CPU: ${state.scndscore} vs Target: ${state.target}`;
      setTimeout(()=> endGame(), 700);
    } else {
      state.scndscore += ball;
      triggerThrowAnim();
      addBallDisplay(ball);
      updateScoreboard('cpu2');
      const need = state.target - state.scndscore + 1;
      showFlash(ball===0?'DOT':`${ball}!`);
      if(state.scndscore > state.target){
        document.getElementById('playMsg').textContent = `CPU wins! They chased ${state.target+1}.`;
        setTimeout(()=> endGame(), 700);
      } else {
        document.getElementById('needDisplay').textContent = need;
        document.getElementById('playMsg').textContent = ball===0
          ? `Dot ball! CPU needs ${need} more.`
          : `CPU scored ${ball}. Needs ${need} more.`;
      }
    }
  } else {
    // user chasing
    if(ball === chosen){
      triggerWicket();
      addBallDisplay('W');
      updateBallsDisplay();
      document.getElementById('playMsg').textContent = `OUT! You scored ${state.scndscore} vs Target: ${state.target}`;
      setTimeout(()=> endGame(), 700);
    } else {
      state.scndscore += chosen;
      triggerBatAnim(chosen);
      addBallDisplay(chosen);
      updateScoreboard('user2');
      const need = state.target - state.scndscore + 1;
      showFlash(chosen===0?'DOT':`${chosen}!`);
      if(state.scndscore > state.target){
        document.getElementById('playMsg').textContent = `${state.name} wins! You chased ${state.target+1}!`;
        setTimeout(()=> endGame(), 700);
      } else {
        document.getElementById('needDisplay').textContent = need;
        document.getElementById('playMsg').textContent = chosen===0
          ? `Dot ball! You need ${need} more.`
          : `You scored ${chosen}! Need ${need} more.`;
      }
    }
  }
}

// ---- END GAME ----
function endGame(){
  showScreen('screenResult');
  const fs = state.frstscore, ss = state.scndscore;
  let winner, scores;
  const tgt = state.target;

  if(ss > tgt){
    // chaser won
    winner = state.battingNow === 'user' ? `🏆 ${state.name} WINS!` : '💻 CPU WINS!';
  } else if(ss < tgt){
    winner = state.battingNow === 'user' ? '💻 CPU WINS!' : `🏆 ${state.name} WINS!`;
  } else {
    winner = "🤝 IT'S A TIE!";
  }

  if(state.userBatsFirst){
    scores = `${state.name}: ${fs} | CPU: ${ss} (Target was ${tgt+1})`;
  } else {
    scores = `CPU: ${fs} | ${state.name}: ${ss} (Target was ${tgt+1})`;
  }

  document.getElementById('resultWinner').textContent = winner;
  document.getElementById('resultScores').textContent = scores;
  updateScoreboard();

  if(winner.includes(state.name)) launchFireworks();
}

// ---- SCOREBOARD UPDATE ----
function updateScoreboard(who){
  const s1 = document.getElementById('score1');
  const s2 = document.getElementById('score2');

  if(state.userBatsFirst){
    // user = 1st innings, cpu = 2nd
    s1.textContent = state.frstscore === 0 && state.phase==='name' ? '—' : state.frstscore;
    s2.textContent = state.scndscore === 0 && state.phase!=='innings2' && state.phase!=='result' ? '—' : state.scndscore;
    document.getElementById('team1Name').textContent = state.name.toUpperCase().slice(0,8);
    document.getElementById('team2Name').textContent = 'CPU';
  } else {
    // cpu bats first
    s1.textContent = state.name.toUpperCase().slice(0,8);
    document.getElementById('team1Name').textContent = 'CPU';
    document.getElementById('team2Name').textContent = state.name.toUpperCase().slice(0,8);
    // swap display: frstscore=cpu, scndscore=user
    document.getElementById('score1').textContent = state.frstscore === 0 && state.phase==='name' ? '—' : state.frstscore;
    document.getElementById('score2').textContent = state.scndscore === 0 && state.phase!=='innings2' && state.phase!=='result' ? '—' : state.scndscore;
  }

  // Flash animation
  if(who){
    const el = (who==='user'||who==='user2') ? document.getElementById('score1') : document.getElementById('score2');
    el.classList.remove('updated');
    void el.offsetWidth;
    el.classList.add('updated');
    setTimeout(()=>el.classList.remove('updated'), 600);
  }
}

// ---- BALLS DISPLAY ----
function addBallDisplay(val){
  state.balls.push(val);
  if(state.balls.length > 12) state.balls.shift();
  updateBallsDisplay();
}

function updateBallsDisplay(){
  const row = document.getElementById('ballsRow');
  row.innerHTML = '';
  state.balls.forEach(v=>{
    const d = document.createElement('div');
    d.className = 'ball-dot';
    if(v === 'W'){
      d.classList.add('wicket');
      d.textContent = 'W';
    } else {
      const num = parseInt(v);
      if(num === 0){
        d.classList.add('zero');
        d.textContent = '•';
      } else if(num <= 2){
        d.classList.add('run1');
        d.textContent = num;
      } else if(num <= 4){
        d.classList.add('run3');
        d.textContent = num;
      } else {
        d.classList.add('run5');
        d.textContent = num;
      }
    }
    row.appendChild(d);
  });
}

// ---- ANIMATIONS ----
function triggerBatAnim(runs){
  const bat = document.getElementById('batAnim');
  bat.classList.remove('swing');
  void bat.offsetWidth;
  bat.classList.add('swing');

  const ball = document.getElementById('ballAnim');
  ball.className = 'ball-anim';
  void ball.offsetWidth;
  ball.classList.add(runs === 0 ? 'dot' : 'hit');
}

function triggerThrowAnim(){
  const ball = document.getElementById('ballAnim');
  ball.className = 'ball-anim';
  void ball.offsetWidth;
  ball.classList.add('throw');
}

function triggerWicket(){
  const wf = document.getElementById('wicketFlash');
  wf.classList.remove('burst');
  void wf.offsetWidth;
  wf.classList.add('burst');
}

function showFlash(text){
  const el = document.getElementById('scoreFlash');
  el.textContent = text;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function launchFireworks(){
  const colors = ['#e8c84a','#ff6644','#6edc8e','#87ceeb','#fff'];
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const fw = document.createElement('div');
      fw.className = 'firework';
      fw.style.left = (20+Math.random()*60)+'%';
      fw.style.top  = (10+Math.random()*50)+'%';
      document.body.appendChild(fw);
      for(let j=0;j<18;j++){
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = (j/18)*360;
        const dist = 40+Math.random()*60;
        s.style.setProperty('--dx', Math.cos(angle*Math.PI/180)*dist+'px');
        s.style.setProperty('--dy', Math.sin(angle*Math.PI/180)*dist+'px');
        s.style.background = colors[Math.floor(Math.random()*colors.length)];
        s.style.animationDelay = Math.random()*0.3+'s';
        fw.appendChild(s);
      }
      setTimeout(()=>fw.remove(), 1500);
    }, i*300);
  }
}

// ---- RESET ----
function resetGame(){
  state = {
    name: state.name,
    pick:'', result:0, userWonToss:false,
    choice:'', userBatsFirst:false,
    frstscore:0, scndscore:0, target:0,
    chosen:-1, phase:'toss', battingNow:'',
    balls:[],
  };
  document.getElementById('score1').textContent = '—';
  document.getElementById('score2').textContent = '—';
  document.getElementById('targetBar').style.display = 'none';
  document.getElementById('inningsBadge').textContent = '1st Innings';
  document.getElementById('ballsRow').innerHTML = '';
  document.getElementById('team1Name').textContent = state.name.toUpperCase().slice(0,8);
  document.getElementById('team2Name').textContent = 'CPU';
  document.querySelectorAll('.toss-btn').forEach(b=>{ b.classList.remove('active'); b.disabled=false; });
  document.getElementById('btnFlip').classList.add('hidden');
  document.getElementById('btnFlip').disabled = false;
  document.getElementById('coinEl').textContent = '?';
  document.getElementById('tossResult').textContent = '';
  document.getElementById('coinWrap').classList.add('hidden');
  document.getElementById('tossMsg').textContent = 'TOSS TIME! Call it:';
  showScreen('screenToss');
}
</script>
</body>
</html>
